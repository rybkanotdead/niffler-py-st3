[pytest]
# Pytest configuration
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Allure options
addopts =
    --strict-markers
    -ra

# Markers
markers =
    ui: UI tests (Selenium/Selene)
    api: API tests (requests)
    db: Database tests
    grpc: gRPC tests
    soap: SOAP tests
    kafka: Kafka tests
    smoke: Smoke tests
    integration: Integration tests
    regression: Regression tests

testpaths = tests

# Logging
log_cli = false
log_level = INFO

